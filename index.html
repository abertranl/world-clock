<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World clock</title>
  </head>
  <body>
    <div class="container">
      <div>
        <h1>One more world clock 🕑</h1>
        <select id="continent-select">
          <option value="">America</option>
          <option value="">Africa</option>
          <option value="">Asia</option>
          <option value="">Europe</option>
          <option value="">Oceania</option>
        </select>
      </div>

      <div class="city" id="saopaulo">
        <div class="city-name-date">
          <h2>São Paulo</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="lima">
        <div class="city-name-date">
          <h2>Lima</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="newyork">
        <div class="city-name-date">
          <h2>New York</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="bogota">
        <div class="city-name-date">
          <h2>Bogotá</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="mexico">
        <div class="city-name-date">
          <h2>Mexico City</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>

    <footer>
      <p>
        Created by <strong>Andrea Bertran</strong> and open sourced on
        <a href="https://github.com/andrea-bertran/world-clock">Github</a>.
      </p>
    </footer>
  </body>
  <script src="javascript/index.js"></script>
</html>
