<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <title>One more world clock</title>
  </head>
  <body>
    <div id="clocks">
      <h1>One more world clock</h1>
      <select id="Continent-select">
        <option value="">Select a continent</option>
        <option value="">Africa</option>
        <option value="">America</option>
        <option value="">Asia</option>
        <option value="">Europe</option>
        <option value="">Oceania</option>
      </select>
    </div>

    <div class="city">
      <h2>São Paulo</h2>
      <div class="date">February 28th 2026</div>
      <div class="time">5:25 PM</div>
    </div>
    <div class="city">
      <h2>CDMX</h2>
      <div class="date">February 28th 2026</div>
      <div class="time">5:25 PM</div>
    </div>

    <footer>
      <p>
        Created by Andrea Bertran and
        <a href="https://github.com/andrea-bertran/world-clock"
          >open sourced on Github</a
        >
      </p>
    </footer>
  </body>
  <script src="javascript/index.js"></script>
</html>
