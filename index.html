<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>One more world clock</title>
  </head>
  <body>
    <div class="container">
      <div>
        <h1>One more world clock</h1>
        <select id="continent-select">
          <option value="">Select a continent</option>
          <option value="">Africa</option>
          <option value="">America</option>
          <option value="">Asia</option>
          <option value="">Europe</option>
          <option value="">Oceania</option>
        </select>
      </div>

      <div class="city">
        <div class="city-name-date">
          <h2>São Paulo</h2>
          <div class="date">February 28th 2026</div>
        </div>
        <div class="time">5:25 <small>PM</small></div>
      </div>

      <div class="city">
        <div class="city-name-date">
          <h2>São Paulo</h2>
          <div class="date">February 28th 2026</div>
        </div>
        <div class="time">5:25 <small>PM</small></div>
      </div>
    </div>

    <footer>
      <p>
        Created by <strong>Andrea Bertran</strong> and open sourced on
        <a href="https://github.com/andrea-bertran/world-clock">Github</a>.
      </p>
    </footer>

  <script src="javascript/index.js"></script>
</html>
