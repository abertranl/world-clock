<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World clock</title>
  </head>
  <body>
    <div class="container">
      <div>
        <h1>One more world clock 🕑</h1>
        <select id="continent-select">
          <option value="america">America</option>
          <option value="africa">Africa</option>
          <option value="asia">Asia</option>
          <option value="europe">Europe</option>
          <option value="oceania">Oceania</option>
          <option value="yourtime">Your timezone</option>
        </select>
      </div>

      <!-- America -->
      <div class="continent" id="america-cities">
        <div class="city" id="saopaulo">
          <div class="city-name-date">
            <h2>São Paulo</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="newyork">
          <div class="city-name-date">
            <h2>New York</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="mexico">
          <div class="city-name-date">
            <h2>Mexico City</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>

      <!-- Africa -->
      <div class="continent" id="africa-cities">
        <div class="city" id="nairobi">
          <div class="city-name-date">
            <h2>Nairobi</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="capetown">
          <div class="city-name-date">
            <h2>Cape Town</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="algiers">
          <div class="city-name-date">
            <h2>Algiers</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>

      <!-- Asia -->
      <div class="continent" id="asia-cities">
        <div class="city" id="tokyo">
          <div class="city-name-date">
            <h2>Tokyo</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="beijing">
          <div class="city-name-date">
            <h2>Beijing</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="bangkok">
          <div class="city-name-date">
            <h2>Bangkok</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>

      <!-- Europe -->

      <div class="continent" id="europe-cities">
        <div class="city" id="bucharest">
          <div class="city-name-date">
            <h2>Bucharest</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="paris">
          <div class="city-name-date">
            <h2>Paris</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="london">
          <div class="city-name-date">
            <h2>London</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>

      <!-- Oceania -->
      <div class="continent" id="oceania-cities">
        <div class="city" id="wellington">
          <div class="city-name-date">
            <h2>Wellington</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="sydney">
          <div class="city-name-date">
            <h2>Sydney</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>

        <div class="city" id="portmoresby">
          <div class="city-name-date">
            <h2>Port Moresby</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>

      <!-- Your Current Time -->
      <div class="continent" id="yourtime-cities">
        <div class="city" id="current-time">
          <div class="city-name-date">
            <h2>Your Timezone</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>

    <footer>
      <p>
        Created by <strong>Andrea Bertran</strong> and open sourced on
        <a href="https://github.com/andrea-bertran/world-clock">Github</a>.
      </p>
    </footer>
  </body>
  <script src="javascript/index.js"></script>
</html>
